name: Bug Report
description: Report a bug to help us improve Nickel Browser.
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please follow these guidelines to help us fix it efficiently.
  - type: input
    id: version
    attributes:
      label: Nickel Version
      description: |
        What version of Nickel Browser are you using? (Check Settings > About Nickel)
      placeholder: e.g., 1.0.0-alpha
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: |
        What operating system and version are you using?
      placeholder: e.g., Windows 11, Ubuntu 22.04, macOS Sonoma
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: |
        Please provide clear, numbered steps to reproduce the issue.
      placeholder: |
        1. Open Nickel Browser.
        2. Visit website.com.
        3. Click on the 'X' button.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: |
        What did you expect to happen?
      placeholder: e.g., The 'X' button should close the window.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: |
        What actually happened?
      placeholder: e.g., The 'X' button does nothing.
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Add any other screenshots, logs, or context about the bug here.
