name: Bug report
description: Create a report to help us improve.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: How can we reproduce it?
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Nickel
        2. Go to '...'
        3. Click on '....'
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nickel version
      description: Found in 'About Nickel Browser'.
      placeholder: e.g. 1.0.0-alpha
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux (Debian/Ubuntu/Zorin)
        - Linux (Other)
        - Other
    validations:
      required: true
  - type: textarea
    id: additional-info
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Validations
      options:
        - label: I have searched for existing issues.
          required: true
        - label: I am using the latest version of Nickel Browser.
          required: true
