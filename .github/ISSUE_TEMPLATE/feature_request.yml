name: Feature Request
description: Propose a new feature for Nickel Browser.
title: "[FEAT]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to request a feature! Please follow these guidelines to help us build a better browser.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem does this feature solve? How does it benefit Nickel users?
      placeholder: |
        Currently, Nickel users have to manually...
    validations:
      required: true
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: |
        Describe the feature you'd like to see. How would it work?
      placeholder: |
        I would like to see a feature that...
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy Impact
      description: |
        How does this feature align with Nickel's privacy-first philosophy?
      placeholder: |
        This feature works entirely locally...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        What other solutions have you thought of?
      placeholder: |
        An alternative would be to use an extension, but...
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Add any other screenshots, mockups, or context about the feature request here.
