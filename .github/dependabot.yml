# Dependabot Configuration
# LOCKED DOWN - Do NOT auto-upgrade actions to major versions without manual review
# Major version bumps (v5→v6, v4→v5 etc.) often have BREAKING CHANGES
#
# NOTE: npm ecosystem removed — this repo has no package.json; the npm
#       entries caused recurring Dependabot failures with nothing to update.

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "04:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps):"
    labels: ["dependencies", "ci"]
    reviewers: ["Shoislam0311"]
    assignees: ["Shoislam0311"]
    # IMPORTANT: Pin specific versions to prevent breaking changes
    # Only allow MINOR version patches (X.Y.Z → X.Y.Z+1)
    # NEVER allow MAJOR version bumps (X.Y.Z → (X+1).0.0) without PR approval
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      actions:
        patterns:
          - "actions/checkout"
          - "actions/upload-artifact"
          - "actions/download-artifact"
          - "apple-actions/*"
          - "actions/configure-pages"
          - "actions/upload-pages-artifact"
