# .github/workflows/build.yml
name: Nickel Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest-16-core
    steps:
      - uses: actions/checkout@v4

      - name: Maximize disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build pkg-config libglib2.0-dev libgtk-3-dev libpulse-dev \
          libasound2-dev libdbus-1-dev libx11-dev libxfixes-dev libxss-dev libxtst-dev \
          libatk1.0-dev libcups2-dev libdrm-dev mesa-common-dev libgbm-dev

      - name: Get depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git ~/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Clone ungoogled-chromium
        run: |
          git clone https://github.com/ungoogled-software/ungoogled-chromium.git ~/nickel-src/ungoogled-chromium

      - name: Fetch Chromium
        run: |
          mkdir -p ~/nickel-src
          cd ~/nickel-src
          fetch --nohooks chromium
          cd src
          gclient sync -D
          gclient runhooks

      - name: Apply Nickel Modifications
        run: |
          SRC_DIR=~/nickel-src/src bash scripts/apply_patches.sh
          SRC_DIR=~/nickel-src/src bash scripts/degoogle_chromium.sh
          SRC_DIR=~/nickel-src/src bash scripts/apply_nickel_branding.sh

      - name: Configure and Build
        working-directory: ~/nickel-src/src
        run: |
          gn gen out/Nickel --args='is_official_build=true is_debug=false symbol_level=0 enable_nacl=false proprietary_codecs=true ffmpeg_branding="Chrome" enable_reporting=false google_api_key=""'
          autoninja -C out/Nickel chrome

      - name: Package AppImage
        run: SRC_DIR=~/nickel-src/src bash scripts/build_appimage.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NickelBrowser-Linux
          path: ~/nickel-src/src/out/Nickel/*.AppImage

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ~/nickel-src/src/out/Nickel/*.AppImage
          tag_name: ${{ github.ref_name }}
          name: Nickel Browser ${{ github.ref_name }}
          body: "Official release of Nickel Browser - Block Everything. Leak Nothing. Own Your Web."
          draft: false
          prerelease: false

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build Website
        run: |
          mkdir -p public
          cp -r web/* public/
          cp src/nickel/branding/Nickel.png public/logo.png 2>/dev/null || echo "Logo not found, using default"
      - name: Upload Website Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
