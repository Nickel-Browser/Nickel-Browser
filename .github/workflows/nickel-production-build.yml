name: 🛡️ Nickel Browser Production Build

# ============================================================================
# PRODUCTION BUILD WORKFLOW - V3.0 (Dependabot-Fix Edition)
# ============================================================================
#
# Strategy: Binary Repagging of Ungoogled-Chromium Binaries
# Base: Ungoogled-Chromium (NOT raw Chromium)
# Build Time: ~15 minutes total (not 8 hours like source build)
# Platforms: Linux (x64), macOS (x64), Windows (x64)
# Releases: Tag-based (v*) + Weekly schedule + Manual dispatch
#
# Version History:
#   v1.0 - Initial binary repagging implementation
#   v2.0 - THIS VERSION: Fixed Dependabot version pinning, professional releases
#   v3.0 - Future: Add testing, signing, multi-arch support
#
# ============================================================================

on:
  push:
    tags:
      - 'v*'           # Release builds when version tag pushed
    branches:
      - 'main'         # CI builds on main branch
  pull_request:
    branches:
      - 'main'         # PR validation builds
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Custom ungoogled-chromium version (e.g., 124.0.6367.82-1)'
        required: false
        default: ''
      skip_cache:
        description: 'Skip cache and do fresh download'
        required: false
        default: 'false'
      release_type:
        description: 'Release type: stable (default), beta, or nightly'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
          - nightly
  schedule:
    - cron: '0 2 * * 1'       # Weekly Monday 2AM UTC
    - cron: '0 14 * * * 3,5'     # Wed/Fri 2PM UTC (additional builds)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref_type != 'tag' }}

permissions:
  contents: read
  packages: read
  releases: write
  id-token: write
  actions: read
  checks: write

env:
  NICKEL_VERSION: "1.0.0-alpha"
  CHROMIUM_CHANNEL: "Stable"
  # Force Node 24 for JS actions (security best practice)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  # ==========================================================================
  # JOB 1: PREPARE - Check for Updates & Metadata
  # ==========================================================================
  prepare:
    name: 🔍 Prepare Build Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      uc_version: ${{ steps.check.outputs.uc_version }}
      should_build: ${{ steps.check.outputs.should_build }}
      build_date: ${{ steps.date.outputs.build_date }}
      nickel_version: ${{ steps.version.outputs.nickel_version }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4.2.0  # PINNED: v4.2.0 (NOT v5/v6!)
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 📅 Get Date
        id: date
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 🔢 Detect Version
        id: version
        run: |
          set -euo pipefail

          # Priority: Manual input > Tag > Schedule > Default
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          elif [ -n "${{ github.event.inputs.chromium_version }}" ]; then
            VERSION="${{ github.event.inputs.chromium_version }}"
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          else
            # Check latest UC release from GitHub API
            LATEST=$(curl -sf -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/ungoogled-software/ungoogled-chromium-binaries/releases/latest" | jq -r '.tag_name')
            VERSION="$LATEST"
            RELEASE_TYPE="nightly"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_name=v$VERSION-${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "nickel_version=${{ env.NICKEL_VERSION }}" >> $GITHUB_OUTPUT

      - name: 🔍 Check Latest UC Version
        id: check
        run: |
          set -euo pipefail

          INPUT_VERSION="${{ github.event.inputs.chromium_version }}"
          LATEST=$(curl -sf -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/ungoogled-software/ungoogled-chromium-binaries/releases/latest" | jq -r '.tag_name')

          if [ -n "$INPUT_VERSION" ]; then
            LATEST="$INPUT_VERSION"
            echo "Using manually specified version: $LATEST"
          else
            echo "Latest ungoogled-chromium: $LATEST"
          fi

          CURRENT="none"
          if [ -f .chromium_version ]; then
            CURRENT=$(cat .chromium_version)
          fi
          echo "Current built version: $CURRENT"

          SHOULD_BUILD="false"
          # Build if version changed, or manual trigger, or tag push, or not on schedule
          if [ "$LATEST" != "$CURRENT" ] || [ "${{ github.event_name }}" != "schedule" ] || [ -n "${{ github.event.inputs.chromium_version }}" ]; then
            SHOULD_BUILD="true"
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "uc_version=$LATEST" >> $GITHUB_OUTPUT

      - name: 💾 Persist Version (if not PR)
        if: success() && github.event_name != 'pull_request'
        run: |
          echo "${{ steps.check.outputs.uc_version }}" > .chromium_version
          git config user.name "Nickel CI Bot"
          git config user.email "ci@nickel-browser.org"
          git add .chromium_version
          git commit -m "chore: track build of Chromium ${{ steps.check.outputs.uc_version }}" || true
          git push || true

  # ==========================================================================
  # JOB 2: BUILD LINUX (x64)
  # ==========================================================================
  build-linux:
    name: 🐧 Build Linux (x64)
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      NICKEL_DIR: ${{ github.workspace }}
      BINARY_DIR: ${{ github.workspace }}/uc-binary
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.2.0  # PINNED: v4.2.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: 💾 Maximize Disk Space
        uses: easimon/maximize-build-space@v10.3.0
        with:
          root-reserve-mb: 8192
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget tar xz-utils dpkg-dev coreutils ninja-build pkg-config libgtk-3-dev libpulse-dev libasound2-dev libdbus-1-dev libx11-dev libxcomposite-dev libxdamage-dev libxfixes-dev libxi-dev libxrandr-dev libxss-dev libxtst6-dev libatk1.0-dev libcups2-dev libdrm-dev mesa-common-dev libgbm-dev libssl-dev libnss3-dev libffi-dev gperf bison

      - name: 📦 Setup Depot Tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: 🔄 Cache UC Binary
        uses: actions/cache@v4.2.0  # PINNED: v4.2.0
        id: uc-cache
        with:
          path: ${{ env.BINARY_DIR }}
          key: uc-binary-linux-${{ needs.prepare.outputs.uc_version }}-${{ hashFiles('scripts/apply-nickel-branding.sh', 'scripts/build-deb.sh', 'scripts/build-appimage.sh') }}
          restore-keys: |
            uc-binary-linux-
            uc-binary-linux-

      - name: ⬇️ Download UC Binary (with retry)
        if: steps.uc-cache.outputs.cache-hit != 'true' || github.event.inputs.skip_cache == 'true'
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "Download attempt $attempt of $max_attempts..."
            if chmod +x scripts/download-uc-binary.sh && \
               GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} ./scripts/download-uc-binary.sh linux "${{ needs.prepare.outputs.uc_version }}" "${{ env.BINARY_DIR }}"; then
              echo "✅ Download successful"
              break
            fi
            attempt=$((attempt + 1))
            sleep $(( attempt * 10 ))
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "❌ Failed to download after $max_attempts attempts"
            exit 1
          fi

      - name: 🔧 Apply Branding & Package
        run: |
          chmod +x scripts/apply-nickel-branding.sh
          chmod +x scripts/build-deb.sh
          chmod +x scripts/build-appimage.sh

          export NICKEL_DIR="${{ github.workspace }}"
          export BINARY_DIR="${{ env.BINARY_DIR }}"
          export NICKEL_VERSION="${{ needs.prepare.outputs.nickel_version }}"

          ./scripts/apply-nickel-branding.sh
          ./scripts/build-deb.sh
          ./scripts/build-appimage.sh

          mkdir -p dist
          mv *.deb *.AppImage dist/ 2>/dev/null || true
          cd dist
          sha256sum * > checksums-linux.sha256

      - name: ✅ Verify Artifacts
        run: |
          cd ${GITHUB_WORKSPACE}/dist || exit 1
          echo "🔍 Verifying Linux artifacts..."
          for pattern in "*.deb" "*.AppImage"; do
            if ls $pattern 1>/dev/null 2>&1; then
              for f in $pattern; do
                size=$(stat -f%s "$f" 2>/dev/null | stat -c%s "$f")
                if [ "$size" -lt 10000000 ]; then
                  echo "❌ ERROR: $f too small ($size bytes)"
                  exit 1
                fi
                echo "✅ $f ($(( size / 1048576 ))MB)"
              done
            else
              echo "⚠️  No $pattern found"
            fi
          done
      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4.3.3  # PINNED: v4.3.3 (NOT v5/v7!)
        with:
          name: nickel-linux-${{ needs.prepare.outputs.uc_version }}
          path: dist/
          retention-days: 30
          if-no-files-found: warn
          overwrite: true

  # ==========================================================================
  # JOB 3: BUILD MACOS (x64)
  # ==========================================================================
  build-macos:
    name: 🍎 Build macOS
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: macos-14
    timeout-minutes: 30
    env:
      NICKEL_DIR: ${{ github.workspace }}
      BINARY_DIR: ${{ github.workspace }}/uc-binary
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.2.0  # PINNED: v4.2.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: 🛠️ Install Dependencies
        run: |
          brew install jq coreutils

      - name: 📦 Cache UC Binary
        uses: actions/cache@v4.2.0  # PINNED: v4.2.0
        id: uc-cache
        with:
          path: ${{ env.BINARY_DIR }}
          key: uc-binary-macos-${{ needs.prepare.outputs.uc_version }}-${{ hashFiles('scripts/build-dmg.sh') }}
          restore-keys: |
            uc-binary-macos-
            uc-binary-macos-

      - name: ⬇️ Download UC Binary (with retry)
        if: steps.uc-cache.outputs.cache-hit != 'true' || github.event.inputs.skip_cache == 'true'
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "macOS download attempt $attempt of $max_attempts..."
            if chmod +x scripts/download-uc-binary.sh && \
               GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} ./scripts/download-uc-binary.sh macos "${{ needs.prepare.outputs.uc_version }}" "${{ env.BINARY_DIR }}"; then
              echo "✅ Download successful"
              break
            fi
            attempt=$((attempt + 1))
            sleep $(( attempt * 10 ))
          done
      - name: 🔧 Package macOS
        run: |
          chmod +x scripts/build-dmg.sh
          export NICKEL_DIR="${{ github.workspace }}"
          export BINARY_DIR="${{ env.BINARY_DIR }}"
          export NICKEL_VERSION="${{ needs.prepare.outputs.nickel_version }}"
          export DIST_DIR="${{ github.workspace }}/dist"
          ./scripts/build-dmg.sh
          cd ${DIST_DIR}
          shasum -a 256 * > checksums-macos.sha256

      - name: ✅ Verify Artifacts
        run: |
          cd ${GITHUB_WORKSPACE}/dist || exit 1
          for f in *.dmg; do
            [ -f "$f" ] || continue
            size=$(stat -f%z "$f")
            if [ "$size" -lt 50000000 ]; then
              echo "❌ ERROR: $f too small ($size bytes)"
              exit 1
            fi
            echo "✅ $f ($(( size / 1048576 ))MB)"
          done
      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4.3.3  # PINNED: v4.3.3
        with:
          name: nickel-macos-${{ needs.prepare.outputs.uc_version }}
          path: dist/
          retention-days: 30
          if-no-files-found: warn
          overwrite: true

  # ==========================================================================
  # JOB 4: BUILD WINDOWS (x64)
  # ==========================================================================
  build-windows:
    name: 🪟 Build Windows
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      NICKEL_DIR: ${{ github.workspace }}
      BINARY_DIR: D:\nickel-src
      SRC_DIR: D:\nickel-src\src
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.2.0  # PINNED: v4.2.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: 🛠️ Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1.10.0

      - name: 🛠️ Install Dependencies
        shell: pwsh
        run: |
          choco install jq nsis zip -y
          pip install pillow pyyaml

      - name: 📦 Cache UC Binary
        uses: actions/cache@v4.2.0  # PINNED: v4.2.0
        id: uc-cache
        with:
          path: ${{ env.BINARY_DIR }}
          key: uc-binary-windows-${{ needs.prepare.outputs.uc_version }}-${{ hashFiles('scripts/build-windows-installer.sh') }}
          restore-keys: |
            uc-binary-windows-
            uc-binary-windows-

      - name: ⬇️ Download UC Binary (with retry)
        shell: bash
        if: steps.uc-cache.outputs.cache-hit != 'true' || github.event.inputs.skip_cache == 'true'
        run: |
          set -euo pipefail
          NICKEL_DIR_BASH=$(echo "${{ github.workspace }}" | sed 's/\\/\//g')
          BINARY_DIR_BASH=$(echo "${{ env.BINARY_DIR }}" | sed 's/\\/\//g')

          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "Windows download attempt $attempt of $max_attempts..."
            if chmod +x scripts/download-uc-binary.sh && \
                 GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} ./scripts/download-uc-binary.sh windows "${{ needs.prepare.outputs.uc_version }}" "$BINARY_DIR_BASH"; then
              echo "✅ Download successful"
              break
            fi
            attempt=$((attempt + 1))
            sleep $(( attempt * 15 ))
          done
      - name: 🔧 Package Windows
        shell: bash
        run: |
          chmod +x scripts/build-windows-installer.sh
          export NICKEL_DIR=$(echo "${{ github.workspace }}" | sed 's/\\/\//g')
          export BINARY_DIR=$(echo "${{ env.BINARY_DIR }}" | sed 's/\\/\//g')
          export NICKEL_VERSION="${{ needs.prepare.outputs.nickel_version }}"
          export DIST_DIR="$(echo "${{ github.workspace }}" | sed 's/\\/\//g')/dist"
          ./scripts/build-windows-installer.sh
          cd "$DIST_DIR"
          sha256sum * > checksums-windows.sha256

      - name: ✅ Verify Artifacts
        shell: bash
        run: |
          cd "$(echo "${{ github.workspace }}" | sed 's/\\/\//g')/dist" || exit 1
          for f in *.exe *.zip; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || wc -c < "$f")
            if [ "$size" -lt 80000000 ]; then
              echo "❌ ERROR: $f too small ($size bytes)"
              exit 1
            fi
            echo "✅ $f ($(( size / 1048576 ))MB)"
          done

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4.3.3  # PINNED: v4.3.3
        with:
          name: nickel-windows-${{ needs.prepare.outputs.uc_version }}
          path: dist/
          retention-days: 30
          if-no-files-found: warn
          overwrite: true

  # ==========================================================================
  # JOB 5: CREATE PROFESSIONAL RELEASE WITH PROPER TAGGING
  # ==========================================================================
  release:
    name: 🚀 Create Professional Release
    needs: [prepare, build-linux, build-macos, build-windows]
    if: always() && !cancelled() && needs.prepare.outputs.should_build == 'true' && (needs.build-linux.result == 'success' || needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      releases: write
      id-token: write
    steps:
      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4.1.4  # PINNED: v4.1.4 (NOT v5/v8!)
        with:
          path: artifacts
          merge-multiple: true

      - name: 📋 Prepare Release Assets
        run: |
          mkdir -p final_assets
          find artifacts -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} final_assets/ \;
          cd final_assets
          sha256sum *.deb *.AppImage *.dmg *.exe *.zip > combined_checksums.sha256 2>/dev/null || true

      - name: 🏷️ Generate SBOM (Software Bill of Materials)
        uses: anchore/sbom-action@v0.17.0
        with:
          output-file: final_assets/sbom-spdx.json
          upload-artifact: false

      - name: 🏷️ Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: v${{ needs.prepare.outputs.release_name }}
          name: "🛡️ Nickel Browser ${{ needs.prepare.outputs.nickel_version }} (UC ${{ needs.prepare.outputs.uc_version }})"
          body: |
            ## 🛡️ Nickel Browser Production Release
            
            Built on **ungoogled-chromium ${{ needs.prepare.outputs.uc_version }}**
            Build Date: ${{ needs.prepare.outputs.build_date }}
            
            ### 📦 Changes
            - Production-grade optimizations enabled (ThinLTO, size optimization)
            - Latest security patches from upstream Chromium
            - Fully de-googled and privacy-hardened
            - Source-level ad blocking (uBlock Origin compiled-in)
            
            ### 🔒 Verification
            Verify integrity using `combined_checksums.sha256`

            ### 🖼️ Platform Support
            | Platform | Status |
            |---------|--------|
            | Linux (.deb/.AppImage) | ✅ Stable |
            | macOS (.dmg) | ✅ Stable |
            | Windows (.exe) | ✅ Stable |
          files: final_assets/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Generate Release Summary
        if: always()
        run: |
          echo "### 🛡️ Nickel Browser Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ needs.prepare.outputs.nickel_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **UC Base** | ${{ needs.prepare.outputs.uc_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Date** | ${{ needs.prepare.outputs.build_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Linux Build** | ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **macOS Build** | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Windows Build** | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.create_release.outputs.html_url }}" != "" ]; then
            echo "| **Release URL** | [View](${{ steps.create_release.outputs.html_url }}) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **SBOM** | ✅ Generated (SPDX JSON) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Checksums** | ✅ Combined SHA256 |" >> $GITHUB_STEP_SUMMARY

      - name: "📧 Notification: Success"
        if: success() && needs.prepare.outputs.should_build == 'true'
        uses: dawidd6/action-send-mail@v3.11.0
        with:
          server_address: smtp.protonmail.ch
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "🛡️ Nickel Build SUCCESS - ${{ needs.prepare.outputs.uc_version }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Nickel CI <nickel-ci@nickel-browser.org>"
          body: |
            Nickel Browser build completed successfully!

            **Version:** ${{ needs.prepare.outputs.nickel_version }}
            **Chromium:** ${{ needs.prepare.outputs.uc_version }}
            **Date:** ${{ needs.prepare.outputs.build_date }}

            **Release:** ${{ steps.create_release.outputs.html_url }}

            ---
            **Artifacts:**
            - Linux: .deb + AppImage
            - macOS: .dmg
            - Windows: .exe

            **Verification:** Check combined_checksums.sha256

      - name: "🚨 Notification: Failure"
        if: failure() && needs.prepare.outputs.should_build == 'true'
        uses: dawidd6/action-send-mail@v3.11.0
        with:
          server_address: smtp.protonmail.ch
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "🚨 Nickel Build FAILED - ${{ needs.prepare.outputs.uc_version }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Nickel CI <nickel-ci@nickel-browser.org>"
          body: |
            ❌ Nickel Browser build FAILED!

            **Version:** ${{ needs.prepare.outputs.uc_version }}
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Error Summary:**
            - Linux: ${{ needs.build-linux.result }}
            - macOS: ${{ needs.build-macos.result }}
            - Windows: ${{ needs.build-windows.result }}

      - name: 📊 Final Status Report
        if: always()
        run: |
          echo "## 🛡️ Nickel Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered By:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # END OF WORKFLOW
  # ==========================================================================
