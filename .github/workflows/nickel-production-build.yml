name: 🛡️ Nickel Browser Production Build (FIXED)

on:
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version (e.g., 120.0.6099.109)'
        required: false
        default: 'latest'
      skip_cache:
        description: 'Skip cache and do fresh build'
        type: boolean
        default: false
  schedule:
    - cron: '0 */6 * * *'
  push:
    tags:
      - 'v*'
    branches:
      - main

concurrency:
  group: production-build-${{ github.ref }}
  cancel-in-progress: false

env:
  NICKEL_VERSION: "1.0.0-alpha"
  CHROMIUM_CHANNEL: "Stable"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NICKEL_DIR: ${{ github.workspace }}
  SRC_DIR: ${{ runner.os == 'Windows' && 'C:\nickel-src\src' || '~/nickel-src/src' }}
  DEPOT_TOOLS_PATH: ${{ runner.os == 'Windows' && 'C:\depot_tools' || '~/depot_tools' }}

jobs:
  # ============================================================================
  # JOB 1: Check for Chromium Updates
  # ============================================================================
  check-updates:
    name: 🔍 Check Updates
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}
      current_version: ${{ steps.check.outputs.current_version }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔍 Check Latest Version
        id: check
        run: |
          echo "=== STEP 1 START: CHECK CHROMIUM VERSION ==="
          LATEST=$(curl -s "https://chromiumdash.appspot.com/fetch_releases?channel=Stable&num=1" | jq -r '.[0].version')
          CURRENT=$(cat .chromium_version 2>/dev/null || echo "none")
          
          echo "LOG: Latest: $LATEST, Current: $CURRENT"
          
          if [ "$LATEST" != "$CURRENT" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 📊 Update Version File
        if: steps.check.outputs.should_build == 'true'
        run: |
          echo "${{ steps.check.outputs.new_version }}" > .chromium_version
          git config user.name "Nickel CI"
          git config user.email "ci@nickel-browser.org"
          git add .chromium_version
          git commit -m "chore: bump Chromium to ${{ steps.check.outputs.new_version }}" || true
          git push || true

  # ============================================================================
  # JOB 2: Build Matrix
  # ============================================================================
  build:
    name: 🏗️ Build (${{ matrix.os }})
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    
    steps:
      - name: 📥 Checkout Nickel
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 🐧 Linux Deps
        if: runner.os == 'Linux'
        run: |
          echo "=== STEP: INSTALL LINUX DEPS ==="
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"
          sudo apt-get update
          sudo apt-get install -y git curl wget python3 python3-pip ninja-build pkg-config build-essential \
            libglib2.0-dev libgtk-3-dev libpulse-dev libasound2-dev libdbus-1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxdamage-dev libxfixes-dev libxi-dev libxrandr-dev libxss-dev libxtst-dev \
            libatk1.0-dev libcups2-dev libdrm-dev mesa-common-dev libgbm-dev libssl-dev libnss3-dev libffi-dev jq rpm
          df -h

      - name: 🍎 macOS Deps
        if: runner.os == 'macOS'
        run: |
          echo "=== STEP: INSTALL MAC DEPS ==="
          brew install ninja jq
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 🪟 Windows Deps
        if: runner.os == 'Windows'
        run: |
          echo "=== STEP: INSTALL WINDOWS DEPS ==="
          choco install ninja jq nsis -y
          pip install pillow pyyaml

      - name: 🛠️ Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: 📦 Setup Depot Tools
        shell: bash
        run: |
          echo "=== STEP: SETUP DEPOT TOOLS ==="
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ env.DEPOT_TOOLS_PATH }}
          # Normalize path for Windows runners
          if [ "${{ runner.os }}" == "Windows" ]; then
            echo "C:/depot_tools" >> $GITHUB_PATH
          else
            echo "${{ env.DEPOT_TOOLS_PATH }}" >> $GITHUB_PATH
          fi

      - name: 🔄 Cache Chromium
        uses: actions/cache@v4
        id: cache-chromium
        with:
          path: |
            ~/nickel-src
            C:\nickel-src
          key: chromium-${{ needs.check-updates.outputs.new_version }}-${{ runner.os }}-${{ hashFiles('.chromium_version') }}
          restore-keys: |
            chromium-${{ needs.check-updates.outputs.new_version }}-${{ runner.os }}-
            chromium-

      - name: 📥 Fetch Chromium
        shell: bash
        if: steps.cache-chromium.outputs.cache-hit != 'true' || github.event.inputs.skip_cache == 'true'
        run: |
          echo "=== STEP: FETCH CHROMIUM ==="
          export PATH="${{ env.DEPOT_TOOLS_PATH }}:$PATH"
          if [ "${{ runner.os }}" == "Windows" ]; then
            mkdir -p C:/nickel-src
            cd C:/nickel-src
          else
            mkdir -p ~/nickel-src
            cd ~/nickel-src
          fi
          fetch --nohooks chromium
          cd src
          gclient sync -D --with_branch_heads --jobs=16
          gclient runhooks

      - name: 🔧 Apply Patches & Branding
        shell: bash
        run: |
          echo "=== STEP: APPLY PATCHES & BRANDING ==="
          export NICKEL_DIR="${{ github.workspace }}"
          export SRC_DIR="${{ runner.os == 'Windows' && 'C:/nickel-src/src' || '~/nickel-src/src' }}"
          bash $NICKEL_DIR/scripts/apply_patches.sh
          bash $NICKEL_DIR/scripts/apply_nickel_branding.sh

      - name: 🔨 Build Nickel Browser
        shell: bash
        run: |
          echo "=== STEP: BUILD NICKEL ==="
          export NICKEL_DIR="${{ github.workspace }}"
          export SRC_DIR="${{ runner.os == 'Windows' && 'C:/nickel-src/src' || '~/nickel-src/src' }}"
          if [ "${{ runner.os }}" == "Linux" ]; then
            bash $NICKEL_DIR/scripts/build_linux.sh
          elif [ "${{ runner.os }}" == "macOS" ]; then
            bash $NICKEL_DIR/scripts/build_macos.sh
          elif [ "${{ runner.os }}" == "Windows" ]; then
            bash $NICKEL_DIR/scripts/build_windows.sh
          fi

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nickel-${{ runner.os }}-packages
          path: |
            *.deb
            *.rpm
            *.AppImage
            *.dmg
            *.exe
            *.sha256
            *.asc

  # ============================================================================
  # JOB 3: Release & Notify
  # ============================================================================
  release:
    name: 🚀 Release & Notify
    needs: [check-updates, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 🏷️ GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NICKEL_VERSION }}-${{ needs.check-updates.outputs.new_version }}
          name: 🛡️ Nickel ${{ env.NICKEL_VERSION }} (Chromium ${{ needs.check-updates.outputs.new_version }})
          files: artifacts/**/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📧 Email Notification
        if: failure() || success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.protonmail.ch
          server_port: 587
          username: sho.islam0311@proton.me
          password: ${{ secrets.SMTP_PASS }}
          subject: Nickel Build ${{ job.status }} - ${{ needs.check-updates.outputs.new_version }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Nickel CI <ci@nickel-browser.org>
          body: |
            Nickel Browser build for Chromium ${{ needs.check-updates.outputs.new_version }} status: ${{ job.status }}
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
