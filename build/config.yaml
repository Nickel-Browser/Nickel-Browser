# Nickel build configuration
chromium_version: "146.0.7680.177-1"
build_mode: "binary"  # binary | source
uc_binary_dir: "uc-binary"
dist_dir: "dist"
patch_series: "patches/series"

gn_args:
  - "is_official_build = true"
  - "is_debug = false"
  - "symbol_level = 0"
  - "blink_symbol_level = 0"
  - "enable_nacl = false"
  - "enable_widevine = false"
  - "fieldtrial_testing_like_official_build = true"
  - "is_clang = true"
  - "use_lld = true"
  - "defines = [\"NICKEL_BROWSER=1\", \"NICKEL_ADBLOCK_ENABLED=1\", \"NICKEL_FINGERPRINT_PROTECTION=1\", \"NICKEL_TOR_INTEGRATION=1\"]"
